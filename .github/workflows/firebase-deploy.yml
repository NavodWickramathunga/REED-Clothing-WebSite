name: Build and Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Skip install/build because this repo currently contains prebuilt `dist/`.
      # Deploy the committed `dist/` artifacts directly. Remove this shortcut
      # later when source files and build steps are added to the repository.

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase-tools deploy --only hosting --token "$FIREBASE_TOKEN" --project reed-clothing-website
